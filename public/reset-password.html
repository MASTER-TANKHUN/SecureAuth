<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SecureAuth — Reset your password">
  <title>Reset Password — SecureAuth</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Reset Password</h1>
      </div>
      <p class="auth-subtitle">Enter your new password below.</p>

      <div id="alert" class="alert"></div>

      <form id="resetForm" autocomplete="on">
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" class="form-input" placeholder="Enter new password" required autocomplete="new-password" tabindex="1">
            <button type="button" class="pw-toggle" tabindex="3" aria-label="Toggle password visibility">Show</button>
          </div>
          <div class="pw-strength"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
          <div class="pw-strength-text"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="Confirm new password" required autocomplete="new-password" tabindex="2">
          </div>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary" tabindex="4">
          <span class="btn-text">Reset Password</span>
          <span class="spinner"></span>
        </button>
      </form>

      <div class="auth-footer">
        <a href="/index.html">← Back to Login</a>
      </div>
    </div>
    <div class="dev-credit">Developed by MasterT</div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/reset-password.js"></script>
</body>
</html>
