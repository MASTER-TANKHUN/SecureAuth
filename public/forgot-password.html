<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SecureAuth — Reset your password">
  <title>Forgot Password — SecureAuth</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Forgot Password</h1>
      </div>
      <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>

      <div id="alert" class="alert"></div>

      <form id="forgotForm" autocomplete="on">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email" tabindex="1">
          </div>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary" tabindex="2">
          <span class="btn-text">Send Reset Link</span>
          <span class="spinner"></span>
        </button>
      </form>

      <div class="auth-footer">
        <a href="/index.html">← Back to Login</a>
      </div>
    </div>
    <div class="dev-credit">Developed by MasterT</div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
